// ── SVG Chart helpers ─────────────────────────────────────────────────
function SVGBarChart({ data, valueKey='count', labelKey='name', colorKey=null, defaultColor='#C17F3B', height=180 }) {
  const PL=38,PR=10,PT=10,PB=34,W=460,H=height,IW=W-PL-PR,IH=H-PT-PB;
  const maxVal=Math.max(...data.map(d=>d[valueKey]||0),1);
  const gap=IW/Math.max(data.length,1), bw=gap*0.55;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height}}>
      {[0,.5,1].map((f,i)=>{const y=PT+IH*(1-f);return<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#F0E6D3" strokeWidth="1"/><text x={PL-4} y={y+4} textAnchor="end" fontSize="10" fill="#6B3D2E">{Math.round(maxVal*f)}</text></g>;})}
      <line x1={PL} y1={PT+IH} x2={W-PR} y2={PT+IH} stroke="#E2D1B8" strokeWidth="1.5"/>
      {data.map((d,i)=>{const cx=PL+gap*i+gap/2,val=d[valueKey]||0,bH=(val/maxVal)*IH,col=colorKey?d[colorKey]:defaultColor;return<g key={i}><rect x={cx-bw/2} y={PT+IH-bH} width={bw} height={Math.max(bH,0)} fill={col} rx="4"/>{val>0&&<text x={cx} y={PT+IH-bH-4} textAnchor="middle" fontSize="11" fontWeight="600" fill={col}>{val}</text>}<text x={cx} y={PT+IH+16} textAnchor="middle" fontSize="10" fill="#6B3D2E">{d[labelKey]}</text></g>;})}
    </svg>
  );
}

function SVGLineChart({ data, valueKey, labelKey='date', maxVal=3, height=180, color='#C17F3B' }) {
  const PL=38,PR=10,PT=10,PB=34,W=460,H=height,IW=W-PL-PR,IH=H-PT-PB,n=data.length;
  if(!n) return null;
  const step=n>1?IW/(n-1):IW/2;
  const pts=data.map((d,i)=>[PL+(n>1?i*step:IW/2),PT+IH*(1-(d[valueKey]||0)/maxVal)]);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height}}>
      {[0,1,2,3].filter(v=>v<=maxVal).map(v=>{const y=PT+IH*(1-v/maxVal);return<g key={v}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#F0E6D3" strokeWidth="1"/><text x={PL-4} y={y+4} textAnchor="end" fontSize="10" fill="#6B3D2E">{v}★</text></g>;})}
      <line x1={PL} y1={PT+IH} x2={W-PR} y2={PT+IH} stroke="#E2D1B8" strokeWidth="1.5"/>
      {n>1&&<polyline points={pts.map(p=>p.join(',')).join(' ')} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
      {pts.map(([x,y],i)=><g key={i}><circle cx={x} cy={y} r="5" fill={color} stroke="white" strokeWidth="2"/><text x={x} y={PT+IH+16} textAnchor="middle" fontSize="9" fill="#6B3D2E">{data[i][labelKey]}</text></g>)}
    </svg>
  );
}

// ── Star badge ────────────────────────────────────────────────────────
const STAR_STYLE = {
  1:{bg:'#FEF3C7',text:'#B45309',border:'#FDE68A',label:'1 Star'},
  2:{bg:'#FFF7ED',text:'#C2410C',border:'#FED7AA',label:'2 Stars'},
  3:{bg:'#DCFCE7',text:'#15803D',border:'#BBF7D0',label:'3 Stars'},
};
function StarBadge({ stars, size='sm' }) {
  if(!stars) return <span style={{background:'#F3F4F6',color:'#9CA3AF',border:'1px solid #E5E7EB',borderRadius:99,padding:'2px 10px',fontSize:12,fontWeight:600}}>—</span>;
  const s=STAR_STYLE[stars]||STAR_STYLE[1];
  return <span style={{background:s.bg,color:s.text,border:`1px solid ${s.border}`,borderRadius:99,padding:'2px 10px',fontSize:12,fontWeight:600}}>{'⭐'.repeat(stars)}</span>;
}

function KPICard({ icon, label, value, sub, color='#C17F3B' }) {
  return (
    <div className="bg-white rounded-xl p-4" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06),0 4px 16px rgba(44,24,16,0.05)'}}>
      <div className="flex items-center gap-2 mb-2">
        <span className="text-xl">{icon}</span>
        <span className="text-xs text-brown font-medium uppercase tracking-wide">{label}</span>
      </div>
      <div className="text-3xl font-bold" style={{color}}>{value}</div>
      {sub && <div className="text-xs text-gray-400 mt-1">{sub}</div>}
    </div>
  );
}

// ── Map Page (Leaflet) ────────────────────────────────────────────────
function MapPage({ stops }) {
  const mapRef = useRef(null);
  const instanceRef = useRef(null);

  useEffect(() => {
    if (!mapRef.current || !window.L) return;
    if (instanceRef.current) { instanceRef.current.remove(); instanceRef.current = null; }

    const map = L.map(mapRef.current, { zoomControl: true }).setView([33.4800, -111.9800], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(map);

    const colors = { 3:'#15803D', 2:'#C2410C', 1:'#B45309', 0:'#9CA3AF' };
    const labels = { 3:'⭐⭐⭐', 2:'⭐⭐', 1:'⭐', 0:'—' };

    stops.filter(s => s.lat && s.lng).forEach(s => {
      const col = colors[s.stars] || colors[0];
      const marker = L.circleMarker([s.lat, s.lng], {
        radius: 10, fillColor: col, color: '#fff', weight: 2.5,
        opacity: 1, fillOpacity: 0.9
      }).addTo(map);
      marker.bindPopup(
        `<div style="font-family:Inter,sans-serif;min-width:180px">
          <div style="font-weight:700;font-size:14px;margin-bottom:4px">${s.company}</div>
          <div style="color:#6B3D2E;font-size:12px;margin-bottom:6px">${s.date} · ${s.cat}</div>
          <div style="font-size:16px;margin-bottom:4px">${labels[s.stars] || '—'}</div>
          ${s.wb||s.gc ? `<div style="font-size:11px;color:#888">WB: ${s.wb} · GC: ${s.gc}</div>` : ''}
          ${s.notes ? `<div style="font-size:11px;color:#555;margin-top:6px;font-style:italic">${s.notes}</div>` : ''}
        </div>`
      );
    });

    // Legend
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = () => {
      const div = L.DomUtil.create('div');
      div.style.cssText = 'background:white;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-family:Inter,sans-serif;font-size:12px';
      div.innerHTML = [3,2,1].map(n=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${colors[n]}"></span>${labels[n]}</div>`).join('');
      return div;
    };
    legend.addTo(map);

    instanceRef.current = map;
    return () => { if (instanceRef.current) { instanceRef.current.remove(); instanceRef.current = null; } };
  }, [stops]);

  const stopsWithCoords = stops.filter(s => s.lat && s.lng).length;

  return (
    <div className="space-y-4 fade-in">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-espresso">Route Map</h1>
          <p className="text-brown text-sm mt-1">{stopsWithCoords} stops plotted across the Phoenix metro</p>
        </div>
        <div className="flex gap-3 text-xs">
          {[{c:'#15803D',l:'3 Stars'},{c:'#C2410C',l:'2 Stars'},{c:'#B45309',l:'1 Star'}].map(x=>(
            <div key={x.l} className="flex items-center gap-1.5">
              <div className="w-3 h-3 rounded-full" style={{background:x.c}}></div>
              <span className="text-brown">{x.l}</span>
            </div>
          ))}
        </div>
      </div>
      <div ref={mapRef} style={{height:'580px',width:'100%',borderRadius:12,zIndex:0}}></div>
    </div>
  );
}

// ── Overview Page ─────────────────────────────────────────────────────
function OverviewPage({ stops, routes, beans }) {
  const valid = stops.filter(s => s.stars > 0);
  const s3 = stops.filter(s => s.stars === 3).length;
  const s2 = stops.filter(s => s.stars === 2).length;
  const s1 = stops.filter(s => s.stars === 1).length;
  const totalWB = stops.reduce((a,s)=>a+s.wb,0) + beans.wbAdj;
  const totalGC = stops.reduce((a,s)=>a+s.gc,0) + beans.gcAdj;
  const avgStars = valid.length ? (valid.reduce((a,s)=>a+s.stars,0)/valid.length).toFixed(2) : '—';

  const starData = [
    {name:'⭐',count:s1,color:'#B45309'},
    {name:'⭐⭐',count:s2,color:'#C2410C'},
    {name:'⭐⭐⭐',count:s3,color:'#15803D'},
  ];

  const routeTrend = routes.map(r => {
    const rs = stops.filter(s => s.route_id===r.id && s.stars>0);
    return { date: r.date.slice(5), avg: rs.length ? +(rs.reduce((a,s)=>a+s.stars,0)/rs.length).toFixed(2) : 0 };
  }).filter(r => r.avg > 0);

  const byCat = useMemo(() => {
    const m = {};
    stops.filter(s=>s.stars>0).forEach(s => {
      if (!m[s.cat]) m[s.cat] = { name:s.cat, total:0, sum:0 };
      m[s.cat].total++; m[s.cat].sum += s.stars;
    });
    return Object.values(m).map(x=>({...x,avg:+(x.sum/x.total).toFixed(1)})).sort((a,b)=>b.avg-a.avg);
  }, [stops]);

  const recent = [...stops].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);

  return (
    <div className="space-y-6 fade-in">
      <div>
        <h1 className="text-2xl font-bold text-espresso">Good morning, Chandler ☕</h1>
        <p className="text-brown text-sm mt-1">{routes.length} route days · {stops.length} total stops · {valid.length} rated</p>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KPICard icon="📍" label="Total Stops" value={stops.length} sub={`${valid.length} rated`}/>
        <KPICard icon="⭐⭐⭐" label="3-Star Stops" value={s3} sub="Highly engaged" color="#15803D"/>
        <KPICard icon="☕" label="Whole Bean Given" value={totalWB} sub="bags total"/>
        <KPICard icon="🫘" label="Ground Coffee Given" value={totalGC} sub="bags total" color="#6B3D2E"/>
        <KPICard icon="⭐⭐" label="2-Star Stops" value={s2} sub="Good visits" color="#C2410C"/>
        <KPICard icon="⭐" label="1-Star Stops" value={s1} sub="Low engagement" color="#B45309"/>
        <KPICard icon="📊" label="Avg Rating" value={avgStars} sub="Out of 3.0" color="#5C6E2E"/>
        <KPICard icon="🗓️" label="Route Days" value={routes.length} sub="Feb 27 – Apr 6" color="#4A2C1A"/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="bg-white rounded-xl p-5" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06),0 4px 16px rgba(44,24,16,0.05)'}}>
          <h3 className="font-semibold text-espresso mb-4">Star Distribution</h3>
          <SVGBarChart data={starData} valueKey="count" labelKey="name" colorKey="color" height={180}/>
        </div>
        <div className="bg-white rounded-xl p-5" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06),0 4px 16px rgba(44,24,16,0.05)'}}>
          <h3 className="font-semibold text-espresso mb-4">Avg Rating by Route Day</h3>
          <SVGLineChart data={routeTrend} valueKey="avg" labelKey="date" maxVal={3} height={180} color="#C17F3B"/>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="bg-white rounded-xl p-5" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06),0 4px 16px rgba(44,24,16,0.05)'}}>
          <h3 className="font-semibold text-espresso mb-4">Avg Rating by Industry</h3>
          <div className="space-y-3 mt-2">
            {byCat.map(x => (
              <div key={x.name} className="flex items-center gap-3">
                <div className="text-sm text-espresso w-40 truncate font-medium">{x.name}</div>
                <div className="flex-1 h-2.5 rounded-full bg-sand overflow-hidden">
                  <div className="h-full rounded-full" style={{width:`${(x.avg/3)*100}%`,background:'#C17F3B'}}></div>
                </div>
                <div className="text-sm font-bold text-espresso w-8 text-right">{x.avg}</div>
                <div className="text-xs text-gray-400 w-10">({x.total})</div>
              </div>
            ))}
          </div>
        </div>

        <div className="bg-white rounded-xl p-5" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06),0 4px 16px rgba(44,24,16,0.05)'}}>
          <h3 className="font-semibold text-espresso mb-4">Recent Stops</h3>
          <div className="space-y-3">
            {recent.map(s => (
              <div key={s.id} className="flex items-start gap-3">
                <div className="flex-shrink-0 mt-0.5"><StarBadge stars={s.stars}/></div>
                <div className="min-w-0">
                  <div className="text-sm font-semibold text-espresso truncate">{s.company}</div>
                  <div className="text-xs text-brown">{s.date} · {s.cat}</div>
                  {s.notes && <div className="text-xs text-gray-500 mt-0.5 truncate">{s.notes}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Log Page ──────────────────────────────────────────────────────────
function LogPage({ stops, routes, onDelete }) {
  const [search, setSearch] = useState('');
  const [filterStars, setFilterStars] = useState('all');
  const [filterCat, setFilterCat] = useState('all');
  const [expanded, setExpanded] = useState(null);

  const cats = [...new Set(stops.map(s=>s.cat))].sort();

  const filtered = useMemo(() => stops.filter(s => {
    const q = search.toLowerCase();
    const matchSearch = !q || s.company.toLowerCase().includes(q) || s.notes.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q);
    const matchStars = filterStars === 'all' || s.stars === parseInt(filterStars);
    const matchCat = filterCat === 'all' || s.cat === filterCat;
    return matchSearch && matchStars && matchCat;
  }).sort((a,b) => b.date.localeCompare(a.date)), [stops, search, filterStars, filterCat]);

  const grouped = useMemo(() => {
    const m = {};
    filtered.forEach(s => { if (!m[s.date]) m[s.date] = []; m[s.date].push(s); });
    return Object.entries(m).sort((a,b) => b[0].localeCompare(a[0]));
  }, [filtered]);

  return (
    <div className="space-y-4 fade-in">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-espresso">Stop Log</h1>
        <span className="text-sm text-brown">{filtered.length} stops</span>
      </div>

      <div className="flex gap-3 flex-wrap">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search companies..." className="border border-sandDark rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:border-caramel flex-1 min-w-48" style={{color:'#2C1810'}}/>
        <select value={filterStars} onChange={e=>setFilterStars(e.target.value)} className="border border-sandDark rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:border-caramel" style={{color:'#2C1810'}}>
          <option value="all">All Stars</option>
          <option value="3">⭐⭐⭐ 3 Stars</option>
          <option value="2">⭐⭐ 2 Stars</option>
          <option value="1">⭐ 1 Star</option>
        </select>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="border border-sandDark rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:border-caramel" style={{color:'#2C1810'}}>
          <option value="all">All Industries</option>
          {cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      <div className="space-y-3">
        {grouped.map(([date, dayStops]) => {
          const route = routes.find(r => r.date === date);
          const isOpen = expanded === date;
          return (
            <div key={date} className="bg-white rounded-xl overflow-hidden" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06)'}}>
              <button onClick={()=>setExpanded(isOpen ? null : date)} className="w-full flex items-center justify-between px-5 py-3 hover:bg-cream/50 transition-colors">
                <div className="flex items-center gap-3">
                  <div className="text-sm font-bold text-espresso">{date}</div>
                  {route && <div className="text-xs text-brown bg-sand px-2 py-0.5 rounded-full">{route.name}</div>}
                  <div className="text-xs text-gray-400">{dayStops.length} stops</div>
                </div>
                <div className="flex items-center gap-2">
                  <div className="flex gap-1">
                    {[3,2,1].map(n => { const c=dayStops.filter(s=>s.stars===n).length; return c>0?<span key={n} className="text-xs px-2 py-0.5 rounded-full font-semibold" style={{background:STAR_STYLE[n].bg,color:STAR_STYLE[n].text}}>{c}×{'⭐'.repeat(n)}</span>:null; })}
                  </div>
                  <span className="text-gray-400 text-xs">{isOpen?'▲':'▼'}</span>
                </div>
              </button>
              {isOpen && (
                <div className="border-t border-sand">
                  <table className="w-full text-sm">
                    <thead><tr className="bg-cream text-xs text-brown uppercase tracking-wide">
                      <th className="px-4 py-2 text-left">#</th>
                      <th className="px-4 py-2 text-left">Company</th>
                      <th className="px-4 py-2 text-left">Industry</th>
                      <th className="px-4 py-2 text-center">Rating</th>
                      <th className="px-4 py-2 text-center">WB</th>
                      <th className="px-4 py-2 text-center">GC</th>
                      <th className="px-4 py-2 text-left">Notes</th>
                      <th className="px-4 py-2"></th>
                    </tr></thead>
                    <tbody>
                      {dayStops.sort((a,b)=>a.stop-b.stop).map((s,i) => (
                        <tr key={s.id} className={`border-t border-sand/60 ${i%2===0?'bg-white':'bg-cream/20'}`}>
                          <td className="px-4 py-2.5 text-gray-400 text-xs">{s.stop}</td>
                          <td className="px-4 py-2.5 font-medium text-espresso max-w-xs truncate">{s.company}</td>
                          <td className="px-4 py-2.5 text-brown text-xs">{s.cat}</td>
                          <td className="px-4 py-2.5 text-center"><StarBadge stars={s.stars}/></td>
                          <td className="px-4 py-2.5 text-center text-gray-600">{s.wb||'—'}</td>
                          <td className="px-4 py-2.5 text-center text-gray-600">{s.gc||'—'}</td>
                          <td className="px-4 py-2.5 text-xs text-gray-500 max-w-xs truncate">{s.notes}</td>
                          <td className="px-4 py-2.5 text-right">
                            <button onClick={()=>{if(confirm(`Delete ${s.company}?`))onDelete(s.id);}} className="text-gray-300 hover:text-red-400 text-xs transition-colors">✕</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
        {!grouped.length && <div className="text-center py-12 text-brown">No stops match your filter.</div>}
      </div>
    </div>
  );
}

              <div>
                <label className="block text-xs font-semibold text-espresso mb-3">Star Rating</label>
                <div className="flex gap-2">
                  {[1,2,3].map(n => (
                    <button key={n} onClick={()=>upd('stars', form.stars===n?null:n)}
                      className="flex-1 py-2.5 rounded-lg text-sm font-semibold border-2 transition-all"
                      style={form.stars===n ? {background:STAR_STYLE[n].bg,borderColor:STAR_STYLE[n].text,color:STAR_STYLE[n].text} : {background:'#F9F9F9',borderColor:'#E2D1B8',color:'#9CA3AF'}}>
                      {'⭐'.repeat(n)}
                    </button>
                  ))}
                </div>
                {!form.stars && <p className="text-xs text-gray-400 mt-2">Tap to rate this stop</p>}
              </div>
              <div>
                <label className="block text-xs font-semibold text-espresso mb-3">Coffee Left</label>
                <div className="space-y-2">
                  {[{k:'wb',label:'Whole Bean'},{k:'gc',label:'Ground Coffee'}].map(({k,label})=>(
                    <div key={k} className="flex items-center gap-2">
                      <span className="text-xs text-brown w-24">{label}</span>
                      <button onClick={()=>upd(k,Math.max(0,form[k]-1))} className="w-7 h-7 rounded-full bg-sand flex items-center justify-center text-espresso font-bold text-sm hover:bg-sandDark transition-colors">−</button>
                      <span className="w-6 text-center font-bold text-espresso text-sm">{form[k]}</span>
                      <button onClick={()=>upd(k,form[k]+1)} className="w-7 h-7 rounded-full bg-caramel flex items-center justify-center text-white font-bold text-sm hover:opacity-90 transition-colors">+</button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <button onClick={handleSave} disabled={!form.company.trim()}
            className="w-full py-3 rounded-xl font-semibold text-white transition-all disabled:opacity-40"
            style={{background:'#C17F3B'}}>
            {saved ? '✓ Stop Saved!' : 'Save Stop'}
          </button>
        </div>

        {/* Today's stops */}
        <div className="bg-white rounded-xl p-5 self-start" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06)'}}>
          <h3 className="font-semibold text-espresso mb-3">Stops on {selDate}</h3>
          {stopsForDate.length === 0
            ? <p className="text-sm text-gray-400">No stops yet for this date.</p>
            : <div className="space-y-2">
                {stopsForDate.map(s => (
                  <div key={s.id} className="flex items-center gap-2 py-1.5 border-b border-sand/60 last:border-0">
                    <span className="text-xs text-gray-400 w-4">{s.stop}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium text-espresso truncate">{s.company}</div>
                    </div>
                    <StarBadge stars={s.stars}/>
                  </div>
                ))}
              </div>}
          <div className="mt-4 pt-4 border-t border-sand text-xs text-brown">
            <div>WB today: <strong>{stopsForDate.reduce((a,s)=>a+s.wb,0)}</strong></div>
            <div>GC today: <strong>{stopsForDate.reduce((a,s)=>a+s.gc,0)}</strong></div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Beans Page ────────────────────────────────────────────────────────
function BeansPage({ stops, beans, onSetBeans }) {
  const fromStopsWB = stops.reduce((a,s)=>a+s.wb,0);
  const fromStopsGC = stops.reduce((a,s)=>a+s.gc,0);
  const totalWB = fromStopsWB + beans.wbAdj;
  const totalGC = fromStopsGC + beans.gcAdj;

  const adj = (key, delta) => onSetBeans(prev => ({ ...prev, [key]: prev[key] + delta }));

  const CounterCard = ({ label, icon, total, fromStops, adjKey, adjVal }) => (
    <div className="bg-white rounded-2xl p-6" style={{boxShadow:'0 2px 16px rgba(44,24,16,0.08)'}}>
      <div className="flex items-center gap-3 mb-4">
        <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style={{background:'#FAF6F1'}}>{icon}</div>
        <div>
          <div className="font-bold text-espresso">{label}</div>
          <div className="text-xs text-brown">Bags given out</div>
        </div>
      </div>
      <div className="text-center my-6">
        <div className="text-7xl font-black" style={{color:'#C17F3B'}}>{total}</div>
        <div className="text-sm text-gray-400 mt-2">total bags</div>
      </div>
      <div className="flex items-center justify-center gap-4 mb-6">
        <button onClick={()=>adj(adjKey, -1)} className="w-12 h-12 rounded-full text-2xl font-bold flex items-center justify-center transition-all" style={{background:'#F0E6D3',color:'#6B3D2E'}}>−</button>
        <div className="text-center">
          <div className="text-xs text-gray-400">Manual adjust</div>
          <div className="font-bold text-espresso">{adjVal >= 0 ? `+${adjVal}` : adjVal}</div>
        </div>
        <button onClick={()=>adj(adjKey, +1)} className="w-12 h-12 rounded-full text-2xl font-bold flex items-center justify-center transition-all text-white" style={{background:'#C17F3B'}}>+</button>
      </div>
      <div className="bg-cream rounded-xl p-3 text-xs text-brown space-y-1">
        <div className="flex justify-between"><span>From stop logs</span><span className="font-semibold">{fromStops} bags</span></div>
        <div className="flex justify-between"><span>Manual adjustment</span><span className="font-semibold">{adjVal >= 0 ? `+${adjVal}` : adjVal}</span></div>
        <div className="flex justify-between border-t border-sandDark pt-1 mt-1 font-bold text-espresso"><span>Total given</span><span>{total}</span></div>
      </div>
    </div>
  );

  return (
    <div className="space-y-6 fade-in">
      <div>
        <h1 className="text-2xl font-bold text-espresso">Bean Tracker</h1>
        <p className="text-brown text-sm mt-1">Your running count of coffee samples given out. Adjust manually anytime.</p>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <CounterCard label="Whole Bean" icon="☕" total={totalWB} fromStops={fromStopsWB} adjKey="wbAdj" adjVal={beans.wbAdj}/>
        <CounterCard label="Ground Coffee" icon="🫘" total={totalGC} fromStops={fromStopsGC} adjKey="gcAdj" adjVal={beans.gcAdj}/>
      </div>

      <div className="bg-white rounded-xl p-5" style={{boxShadow:'0 1px 4px rgba(44,24,16,0.06)'}}>
        <h3 className="font-semibold text-espresso mb-4">Bags Given by Route Day</h3>
        <div className="space-y-2">
          {[...new Set(stops.map(s=>s.date))].sort().reverse().map(date => {
            const dayStops = stops.filter(s => s.date === date);
            const wb = dayStops.reduce((a,s)=>a+s.wb,0);
            const gc = dayStops.reduce((a,s)=>a+s.gc,0);
            if (!wb && !gc) return null;
            return (
              <div key={date} className="flex items-center gap-3 py-2 border-b border-sand/60 last:border-0">
                <div className="text-sm font-medium text-espresso w-28">{date}</div>
                <div className="flex gap-3 text-xs">
                  {wb>0 && <span className="px-2 py-0.5 rounded-full font-semibold" style={{background:'#FFF7ED',color:'#C2410C'}}>☕ {wb} WB</span>}
                  {gc>0 && <span className="px-2 py-0.5 rounded-full font-semibold" style={{background:'#F0FDF4',color:'#15803D'}}>🫘 {gc} GC</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────
const NAV = [
  { id:'overview', label:'Overview', icon:'📊' },
  { id:'map',      label:'Map',      icon:'📍' },
  { id:'log',      label:'Stop Log', icon:'📋' },
  { id:'add',      label:'Add Stop', icon:'➕' },
  { id:'beans',    label:'Beans',    icon:'🫘' },
];

function App() {
  const [page, setPage] = useState('overview');
  const [stops, setStops] = useState(() => loadLS('plexus_stops_v2', INIT_STOPS));
  const [routes, setRoutes] = useState(() => loadLS('plexus_routes_v2', INIT_ROUTES));
  const [beans, setBeans] = useState(() => loadLS('plexus_beans', { wbAdj:0, gcAdj:0 }));
  const [sideOpen, setSideOpen] = useState(true);

  useEffect(() => { saveLS('plexus_stops_v2', stops); }, [stops]);
  useEffect(() => { saveLS('plexus_routes_v2', routes); }, [routes]);
  useEffect(() => { saveLS('plexus_beans', beans); }, [beans]);

  const handleAddStop  = useCallback(s => setStops(p => [...p, s]), []);
  const handleAddRoute = useCallback(r => setRoutes(p => [...p, r]), []);
  const handleDelete   = useCallback(id => setStops(p => p.filter(s => s.id !== id)), []);

  const totalWB = stops.reduce((a,s)=>a+s.wb,0) + beans.wbAdj;
  const totalGC = stops.reduce((a,s)=>a+s.gc,0) + beans.gcAdj;

  return (
    <div className="flex min-h-screen" style={{background:'#FAF6F1',fontFamily:"'Inter',sans-serif"}}>
      {/* Sidebar */}
      <aside className={`${sideOpen?'w-52':'w-14'} flex-shrink-0 flex flex-col transition-all duration-200`}
        style={{background:'#2C1810',minHeight:'100vh'}}>
        <div className={`flex items-center gap-3 px-4 py-5 border-b border-white/10 ${!sideOpen&&'justify-center'}`}>
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-lg flex-shrink-0" style={{background:'#C17F3B'}}>☕</div>
          {sideOpen && <div><div className="text-white font-bold text-sm leading-tight">Coffee Tracker</div><div className="text-white/40 text-xs">Plexus Technology</div></div>}
        </div>
        <nav className="flex-1 py-3">
          {NAV.map(n => (
            <button key={n.id} onClick={()=>setPage(n.id)}
              className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-all ${page===n.id?'text-white':'text-white/50 hover:text-white/80 hover:bg-white/5'} ${!sideOpen&&'justify-center'}`}
              style={page===n.id?{background:'rgba(193,127,59,0.25)',borderLeft:'3px solid #C17F3B'}:{borderLeft:'3px solid transparent'}}>
              <span className="text-base flex-shrink-0">{n.icon}</span>
              {sideOpen && n.label}
            </button>
          ))}
        </nav>
        <div className="mt-auto">
          {sideOpen && (
            <button onClick={()=>{if(confirm('Reset all data to original demo data?')){saveLS('plexus_stops_v2',INIT_STOPS);saveLS('plexus_routes_v2',INIT_ROUTES);saveLS('plexus_beans',{wbAdj:0,gcAdj:0});setStops(INIT_STOPS);setRoutes(INIT_ROUTES);setBeans({wbAdj:0,gcAdj:0});}}}
              className="w-full px-4 py-2 text-xs text-white/30 hover:text-white/60 hover:bg-white/5 text-left transition-colors border-t border-white/10">
              ↺ Reset to demo data
            </button>
          )}
          <button onClick={()=>setSideOpen(p=>!p)} className="w-full p-2 text-white/40 hover:text-white/70 text-xs text-center transition-colors">
            {sideOpen?'◀':'▶'}
          </button>
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 overflow-auto">
        <div className="sticky top-0 z-10 bg-cream/90 backdrop-blur border-b border-sand px-6 py-3 flex items-center justify-between" style={{backdropFilter:'blur(8px)'}}>
          <div className="text-sm font-medium text-brown">{NAV.find(n=>n.id===page)?.label}</div>
          <div className="flex items-center gap-4 text-xs text-gray-400">
            <span>☕ {totalWB} WB</span>
            <span>🫘 {totalGC} GC</span>
            <span className="flex items-center gap-1"><span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#15803D'}}></span>Saved · {stops.length} stops</span>
            <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:'#C17F3B'}}>CW</div>
          </div>
        </div>
        <div className="p-6 max-w-6xl mx-auto">
          {page==='overview' && <OverviewPage stops={stops} routes={routes} beans={beans}/>}
          {page==='map'      && <MapPage stops={stops}/>}
          {page==='log'      && <LogPage stops={stops} routes={routes} onDelete={handleDelete}/>}
          {page==='add'      && <AddStopPage stops={stops} routes={routes} onAddStop={handleAddStop} onAddRoute={handleAddRoute}/>}
          {page==='beans'    && <BeansPage stops={stops} beans={beans} onSetBeans={setBeans}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
