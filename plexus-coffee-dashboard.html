// ── Pure-SVG Chart Components (no external library) ───────────────────
function SVGBarChart({ data, valueKey='count', labelKey='name', colorKey=null, defaultColor='#C17F3B', height=200, multiKeys=null, multiColors=['#C17F3B','#6B3D2E'], multiLabels=[] }) {
  const PL=44,PR=12,PT=12,PB=38,W=500;
  const H=height, IW=W-PL-PR, IH=H-PT-PB;
  const maxVal = multiKeys
    ? Math.max(...data.map(d=>Math.max(...multiKeys.map(k=>d[k]||0))),1)
    : Math.max(...data.map(d=>d[valueKey]||0),1);
  const gap=IW/Math.max(data.length,1);
  const bw = multiKeys ? gap*0.35 : gap*0.55;
  const ticks=[0,0.25,0.5,0.75,1];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:height}}>
      {ticks.map((f,i)=>{const y=PT+IH*(1-f);return(<g key={i}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#F0E6D3" strokeWidth="1"/><text x={PL-5} y={y+4} textAnchor="end" fontSize="10" fill="#6B3D2E">{Math.round(maxVal*f)}</text></g>);})}
      <line x1={PL} y1={PT+IH} x2={W-PR} y2={PT+IH} stroke="#E2D1B8" strokeWidth="1.5"/>
      {data.map((d,i)=>{
        const cx=PL+gap*i+gap/2;
        if(multiKeys){return(<g key={i}>{multiKeys.map((k,ki)=>{const val=d[k]||0;const bH=(val/maxVal)*IH;const x=cx-bw+(ki*(bw+3));return(<g key={ki}><rect x={x} y={PT+IH-bH} width={bw} height={Math.max(bH,0)} fill={multiColors[ki]} rx="3"/>{val>0&&<text x={x+bw/2} y={PT+IH-bH-3} textAnchor="middle" fontSize="9" fill={multiColors[ki]}>{val}</text>}</g>);})}<text x={cx} y={PT+IH+16} textAnchor="middle" fontSize="10" fill="#6B3D2E">{d[labelKey]}</text></g>);}
        const val=d[valueKey]||0;const bH=(val/maxVal)*IH;const col=colorKey?d[colorKey]:defaultColor;
        return(<g key={i}><rect x={cx-bw/2} y={PT+IH-bH} width={bw} height={Math.max(bH,0)} fill={col} rx="4"/>{val>0&&<text x={cx} y={PT+IH-bH-4} textAnchor="middle" fontSize="11" fontWeight="600" fill={col}>{val}</text>}<text x={cx} y={PT+IH+16} textAnchor="middle" fontSize="10" fill="#6B3D2E">{d[labelKey]}</text></g>);
      })}
      {multiKeys&&multiLabels.length>0&&<g>{multiLabels.map((lbl,i)=><g key={i}><rect x={PL+i*90} y={H-8} width={10} height={10} fill={multiColors[i]} rx="2"/><text x={PL+i*90+14} y={H-1} fontSize="10" fill="#6B3D2E">{lbl}</text></g>)}</g>}
    </svg>
  );
}

function SVGHBarChart({ data, valueKey='avg', labelKey='name', maxVal=3, height=220, color='#C17F3B' }) {
  const PL=138,PR=48,PT=6,PB=6,W=500;
  const n=data.length,rowH=Math.min(30,Math.max(20,(height-PT-PB)/Math.max(n,1)));
  const H=PT+PB+n*rowH,IW=W-PL-PR;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:Math.max(height,H)}}>
      {data.map((d,i)=>{const val=Math.max(d[valueKey]||0,0);const bW=(val/maxVal)*IW;const y=PT+i*rowH;return(<g key={i}><text x={PL-6} y={y+rowH/2+4} textAnchor="end" fontSize="11" fill="#2C1810" style={{fontWeight:500}}>{d[labelKey]}</text><rect x={PL} y={y+4} width={IW} height={rowH-8} fill="#F0E6D3" rx="4"/><rect x={PL} y={y+4} width={bW} height={rowH-8} fill={color} rx="4"/><text x={PL+bW+5} y={y+rowH/2+4} fontSize="11" fill="#6B3D2E" fontWeight="600">{val}</text></g>);})}
    </svg>
  );
}

function SVGLineChart({ data, valueKey='avg', labelKey='name', maxVal=3, height=200, color='#C17F3B' }) {
  const PL=40,PR=12,PT=12,PB=36,W=500;
  const H=height,IW=W-PL-PR,IH=H-PT-PB,n=data.length;
  const dMax=maxVal||Math.max(...data.map(d=>d[valueKey]||0),1);
  const step=n>1?IW/(n-1):IW/2;
  const pts=data.map((d,i)=>[PL+(n>1?i*step:IW/2),PT+IH*(1-(d[valueKey]||0)/dMax)]);
  const poly=pts.map(p=>p.join(',')).join(' ');
  const gridVals=[...Array(Math.ceil(dMax)+1)].map((_,i)=>i).filter(v=>v<=dMax);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:height}}>
      {gridVals.map(v=>{const y=PT+IH*(1-v/dMax);return(<g key={v}><line x1={PL} y1={y} x2={W-PR} y2={y} stroke="#F0E6D3" strokeWidth="1"/><text x={PL-5} y={y+4} textAnchor="end" fontSize="10" fill="#6B3D2E">{v}</text></g>);})}
      <line x1={PL} y1={PT+IH} x2={W-PR} y2={PT+IH} stroke="#E2D1B8" strokeWidth="1.5"/>
      {n>1&&<polyline points={poly} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}
      {pts.map(([x,y],i)=>(
        <g key={i}>
          <circle cx={x} cy={y} r="5" fill={color} stroke="white" strokeWidth="2"/>
          <text x={x} y={PT+IH+16} textAnchor="middle" fontSize="10" fill="#6B3D2E">{data[i][labelKey]}</text>
          <text x={x} y={y-9} textAnchor="middle" fontSize="10" fill={color} fontWeight="700">{data[i][valueKey]}</text>
        </g>
      ))}
    </svg>
  );
}

function SVGDonut({ data, colors=['#C17F3B','#6B3D2E'], size=200 }) {
  const total=data.reduce((a,d)=>a+d.value,0)||1;
  const cx=size/2,cy=size/2,R=size*0.37,r=size*0.22;
  let ang=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const sweep=(d.value/total)*2*Math.PI;
    const x1=cx+R*Math.cos(ang),y1=cy+R*Math.sin(ang);
    ang+=sweep;
    const x2=cx+R*Math.cos(ang),y2=cy+R*Math.sin(ang);
    const xi1=cx+r*Math.cos(ang-sweep),yi1=cy+r*Math.sin(ang-sweep);
    const xi2=cx+r*Math.cos(ang),yi2=cy+r*Math.sin(ang);
    const lg=sweep>Math.PI?1:0;
    const path=`M${x1},${y1} A${R},${R},0,${lg},1,${x2},${y2} L${xi2},${yi2} A${r},${r},0,${lg},0,${xi1},${yi1} Z`;
    const mid=ang-sweep/2;
    return {path,color:colors[i],label:d.name,value:d.value,mx:cx+(R+22)*Math.cos(mid),my:cy+(R+22)*Math.sin(mid),pct:Math.round(d.value/total*100)};
  });
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:'100%',height:size}}>
      {slices.map((s,i)=>(<g key={i}><path d={s.path} fill={s.color}/><text x={s.mx} y={s.my-5} textAnchor="middle" fontSize="10" fill={s.color} fontWeight="600">{s.label}</text><text x={s.mx} y={s.my+8} textAnchor="middle" fontSize="10" fill={s.color}>{s.value} ({s.pct}%)</text></g>))}
      <text x={cx} y={cy-5} textAnchor="middle" fontSize="15" fill="#2C1810" fontWeight="700">{total}</text>
      <text x={cx} y={cy+12} textAnchor="middle" fontSize="10" fill="#6B3D2E">Total Bags</text>
    </svg>
  );
}

const exportCSV = (stops) => {
  const h = ['Date','Route','Stop#','Company','Category','Address','Contact','Grade','WB','GC','Follow-Up','FU Status','Card','Notes'];
  const rows = stops.map(s => [s.route_date,s.route_id,s.stop_number,s.company_name,s.category,s.address,s.contact_name,s.grade,s.wb,s.gc,s.follow_up?'Yes':'No',s.fu_status,s.card?'Yes':'No',`"${s.notes}"`]);
  const csv = [h,...rows].map(r=>r.join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='plexus_routes.csv'; a.click();
};

const GradeBadge = ({grade, size='sm'}) => {
  if (grade === null || grade === undefined) return <span className="px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-400">—</span>;
  const g = gradeInfo[grade];
  return <span className={`${g.cls} font-semibold rounded-full ${size==='lg'?'px-3 py-1 text-sm':'px-2 py-0.5 text-xs'}`}>Grade {g.short}</span>;
};
const FUBadge = ({status}) => {
  const f = fuInfo[status] || fuInfo.not_started;
  return <span style={{background:f.bg,color:f.text}} className="px-2 py-0.5 rounded-full text-xs font-medium">{f.label}</span>;
};
const KPICard = ({icon, label, value, sub, color='#C17F3B'}) => (
  <div className="bg-white rounded-xl p-5 shadow-card flex items-start gap-4">

);

const OverviewPage = ({stops, routes}) => {
  const valid = stops.filter(s => s.valid && s.category !== 'Internal');
  const grade3 = stops.filter(s => s.grade === 3);
  const fuNeeded = stops.filter(s => s.follow_up);
  const avgGrade = valid.filter(s=>s.grade!==null).reduce((a,s)=>a+s.grade,0) / (valid.filter(s=>s.grade!==null).length||1);
  const totalWB = stops.reduce((a,s)=>a+s.wb,0);
  const totalGC = stops.reduce((a,s)=>a+s.gc,0);
  const convLeads = stops.filter(s=>s.grade===3&&s.follow_up);

  const gradeData = [0,1,2,3].map(g=>({name:`Grade ${g}`,count:stops.filter(s=>s.grade===g).length,color:gradeInfo[g].color}));

  const industryData = useMemo(()=>{
    const m = {}; stops.filter(s=>s.valid&&s.grade!==null).forEach(s=>{
      if (!m[s.category]) m[s.category]={name:s.category,total:0,sum:0};
      m[s.category].total++; m[s.category].sum+=s.grade;
    });
    return Object.values(m).map(x=>({...x,avg:+(x.sum/x.total).toFixed(2)})).sort((a,b)=>b.avg-a.avg);
  },[stops]);

  const routeScores = routes.map(r=>{
    const rs = stops.filter(s=>s.route_id===r.id&&s.grade!==null);
    return {name:r.date.slice(5),avg:rs.length?+(rs.reduce((a,s)=>a+s.grade,0)/rs.length).toFixed(2):0,stops:rs.length};
  });

  const recentActivity = [...stops].sort((a,b)=>b.route_date.localeCompare(a.route_date)).slice(0,5);

  return (
    <div className="space-y-6 fade-in">
      <div>
        <h1 className="text-2xl font-bold text-espresso">Good morning, Chandler ☕</h1>
        <p className="text-brown text-sm mt-1">Here's an overview of your coffee outreach campaign across {routes.length} route days.</p>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KPICard icon="📍" label="Total Stops" value={stops.filter(s=>s.category!=='Internal').length} sub={`${valid.length} valid`} />
        <KPICard icon="⭐" label="Grade 3 Leads" value={grade3.length} sub="Highly engaged" color="#15803D" />
        <KPICard icon="📞" label="Follow-Ups Needed" value={fuNeeded.length} sub={`${convLeads.length} conversion-ready`} color="#B45309" />
        <KPICard icon="📊" label="Avg Route Score" value={avgGrade.toFixed(2)} sub="Out of 3.0" color="#6B7C3D" />
        <KPICard icon="☕" label="Whole Bean Given" value={totalWB} sub="bags" />
        <KPICard icon="🫘" label="Ground Coffee Given" value={totalGC} sub="bags" color="#6B3D2E" />
        <KPICard icon="🗓️" label="Route Days" value={routes.length} sub="Feb 27 – Apr 6" color="#4A2C1A" />
        <KPICard icon="🏢" label="Conversion Ready" value={convLeads.length} sub="Grade 3 + follow-up" color="#1D4ED8" />
      </div>

      {/* Charts Row */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* Grade Breakdown */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Grade Distribution</h3>
          <SVGBarChart data={gradeData} valueKey="count" labelKey="name" colorKey="color" height={200}/>
        </div>

        {/* Avg Score by Route Day */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Avg Grade by Route Day</h3>
          <SVGLineChart data={routeScores} valueKey="avg" labelKey="name" maxVal={3} height={200} color="#C17F3B"/>
        </div>
      </div>

      {/* Industry Avg + Recent Activity */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* Industry Performance */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Avg Grade by Industry</h3>
          <div className="space-y-3">
            {industryData.filter(x=>x.name!=='Invalid'&&x.name!=='Internal').map(x=>(
              <div key={x.name} className="flex items-center gap-3">
                <div className="text-sm text-espresso w-44 truncate">{x.name}</div>
                <div className="flex-1 h-2.5 rounded-full bg-sand overflow-hidden">
                  <div className="h-full rounded-full" style={{width:`${(x.avg/3)*100}%`,background:'#C17F3B'}}></div>
                </div>
                <div className="text-sm font-bold text-espresso w-8 text-right">{x.avg}</div>
                <div className="text-xs text-gray-400 w-12">({x.total})</div>
              </div>
            ))}
          </div>
        </div>

        {/* Recent Activity */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Recent Stops</h3>
          <div className="space-y-3">
            {recentActivity.map(s=>(
              <div key={s.id} className="flex items-start gap-3">
                <GradeBadge grade={s.grade} />
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-espresso truncate">{s.company_name}</div>
                  <div className="text-xs text-gray-400">{fmtDate(s.route_date)} · {s.category}</div>
                </div>
                {s.follow_up && <span className="text-xs text-caramel font-medium mt-0.5">Follow-up</span>}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Grade 3 Alerts */}
      {grade3.filter(s=>s.follow_up&&s.fu_status==='not_started').length>0 && (
        <div className="bg-white border-l-4 rounded-xl p-5 shadow-card" style={{borderColor:'#15803D'}}>
          <h3 className="font-semibold text-espresso mb-3">🚨 High-Value Leads Awaiting Action</h3>

                <span className="text-gray-400">{fmtDate(s.route_date)} · {s.category}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

const RoutesPage = ({stops, routes, onEditStop, onDeleteStop}) => {
  const [search, setSearch] = useState('');
  const [filterGrade, setFilterGrade] = useState('all');
  const [filterCat, setFilterCat] = useState('all');
  const [sortKey, setSortKey] = useState('route_date');
  const [selectedStop, setSelectedStop] = useState(null);
  const [expandedRoute, setExpandedRoute] = useState(null);

  const categories = [...new Set(stops.map(s=>s.category))].sort();

  const filtered = useMemo(()=>{
    return stops.filter(s => {
      if (filterGrade !== 'all' && s.grade !== parseInt(filterGrade)) return false;
      if (filterCat !== 'all' && s.category !== filterCat) return false;
      if (search && ![s.company_name,s.address,s.contact_name,s.notes].join(' ').toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    }).sort((a,b) => {
      if (sortKey==='grade') return (b.grade??-1)-(a.grade??-1);
      if (sortKey==='company') return a.company_name.localeCompare(b.company_name);
      return a.route_date.localeCompare(b.route_date) || a.stop_number - b.stop_number;
    });
  },[stops,search,filterGrade,filterCat,sortKey]);

  return (
    <div className="space-y-5 fade-in">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-espresso">All Routes</h1>
        <button onClick={()=>exportCSV(stops)} className="px-4 py-2 rounded-lg text-sm font-semibold text-white" style={{background:'#6B7C3D'}}>⬇ Export CSV</button>
      </div>

      {/* Filters */}
      <div className="bg-white rounded-xl p-4 shadow-card flex flex-wrap gap-3">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search companies, notes, contacts…"
          className="border border-sandDark rounded-lg px-3 py-2 text-sm text-espresso bg-cream flex-1 min-w-48" />
        <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)} className="border border-sandDark rounded-lg px-3 py-2 text-sm text-espresso bg-cream">
          <option value="all">All Grades</option>
          {[0,1,2,3].map(g=><option key={g} value={g}>Grade {g} — {gradeInfo[g].label}</option>)}
        </select>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} className="border border-sandDark rounded-lg px-3 py-2 text-sm text-espresso bg-cream">
          <option value="all">All Categories</option>
          {categories.map(c=><option key={c}>{c}</option>)}
        </select>
        <select value={sortKey} onChange={e=>setSortKey(e.target.value)} className="border border-sandDark rounded-lg px-3 py-2 text-sm text-espresso bg-cream">
          <option value="route_date">Sort: Date</option>
          <option value="grade">Sort: Grade ↓</option>
          <option value="company">Sort: Company A–Z</option>
        </select>
      </div>

      {/* Route Day Groups */}
      {routes.map(r=>{
        const rStops = filtered.filter(s=>s.route_id===r.id);
        if (!rStops.length) return null;
        const avgG = rStops.filter(s=>s.grade!==null).reduce((a,s)=>a+s.grade,0)/(rStops.filter(s=>s.grade!==null).length||1);
        const totalWB = rStops.reduce((a,s)=>a+s.wb,0);
        const totalGC = rStops.reduce((a,s)=>a+s.gc,0);
        const expanded = expandedRoute === r.id || expandedRoute === null;
        return (
          <div key={r.id} className="bg-white rounded-xl shadow-card overflow-hidden">
            {/* Route Header */}
            <button onClick={()=>setExpandedRoute(expandedRoute===r.id?null:r.id)}
              className="w-full flex items-center justify-between px-5 py-4 hover:bg-cream transition-colors">
              <div className="flex items-center gap-4">
                <div className="text-left">
                  <div className="font-semibold text-espresso">{r.name}</div>
                  <div className="text-xs text-gray-400">{fmtDate(r.date)} · {r.rep} · {r.focus}</div>
                </div>
              </div>
              <div className="flex items-center gap-4 text-sm">
                <span className="text-gray-500">{rStops.length} stops</span>
                <span className="font-semibold text-caramel">Avg {avgG.toFixed(1)}</span>
                <span className="text-gray-400">☕{totalWB} 🫘{totalGC}</span>
                <span className="text-gray-400 text-lg">{expandedRoute===r.id?'▲':'▼'}</span>
              </div>
            </button>

            {/* Stops Table */}
            {expandedRoute===r.id && (
              <div className="overflow-x-auto border-t border-sand">
                <table className="w-full text-sm">
                  <thead><tr className="bg-cream text-brown text-xs uppercase tracking-wide">
                    <th className="px-4 py-2 text-left">#</th>
                    <th className="px-4 py-2 text-left">Company</th>
                    <th className="px-4 py-2 text-left">Category</th>
                    <th className="px-4 py-2 text-left">Contact</th>
                    <th className="px-4 py-2 text-center">Grade</th>
                    <th className="px-4 py-2 text-center">WB</th>
                    <th className="px-4 py-2 text-center">GC</th>
                    <th className="px-4 py-2 text-center">Follow-Up</th>
                    <th className="px-4 py-2 text-left">Notes</th>
                    <th className="px-4 py-2"></th>
                  </tr></thead>
                  <tbody>{rStops.map((s,i)=>(
                    <tr key={s.id} className={`border-t border-sand ${i%2===0?'bg-white':'bg-cream/40'} hover:bg-sand/30 transition-colors`}>
                      <td className="px-4 py-3 text-espresso font-medium">{s.stop_number}</td>
                      <td className="px-4 py-3">
                        <div className="font-medium text-espresso">{s.company_name}</div>
                        <div className="text-xs text-gray-400 truncate max-w-xs">{s.address}</div>
                      </td>
                      <td className="px-4 py-3 text-gray-500">{s.category}</td>
                      <td className="px-4 py-3 text-gray-600">{s.contact_name||'—'}</td>
                      <td className="px-4 py-3 text-center"><GradeBadge grade={s.grade}/></td>
                      <td className="px-4 py-3 text-center text-espresso font-medium">{s.wb||'—'}</td>
                      <td className="px-4 py-3 text-center text-espresso font-medium">{s.gc||'—'}</td>
                      <td className="px-4 py-3 text-center">{s.follow_up?<FUBadge status={s.fu_status}/>:<span className="text-gray-300">—</span>}</td>
                      <td className="px-4 py-3 text-gray-500 text-xs max-w-xs truncate">{s.notes||'—'}</td>
                      <td className="px-4 py-3">
                        <div className="flex gap-1">
                          <button onClick={()=>setSelectedStop(s)} className="px-2 py-1 rounded text-xs bg-sand text-espresso hover:bg-sandDark">Edit</button>
                          <button onClick={()=>onDeleteStop(s.id)} className="px-2 py-1 rounded text-xs bg-red-50 text-red-400 hover:bg-red-100">Del</button>
                        </div>
                      </td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            )}
          </div>
        );
      })}

      {selectedStop && <StopModal stop={selectedStop} onClose={()=>setSelectedStop(null)} onSave={s=>{onEditStop(s);setSelectedStop(null);}} />}
    </div>
  );
};

const DailyEntryPage = ({routes, stops, onAddRoute, onAddStop}) => {
  const [selRoute, setSelRoute] = useState(routes[routes.length-1]?.id||'');
  const [showNewRoute, setShowNewRoute] = useState(false);
  const [newRoute, setNewRoute] = useState({date:new Date().toISOString().slice(0,10),name:'',rep:'Chandler White',area:'Phoenix AZ',focus:'Law'});
  const [newStop, setNewStop] = useState({stop_number:'',company_name:'',category:'Law',address:'',contact_name:'',contact_title:'',phone:'',grade:null,wb:0,gc:0,follow_up:false,fu_status:'not_started',valid:true,repeat:false,card:false,notes:''});
  const [showStopForm, setShowStopForm] = useState(false);
  const [editingStop, setEditingStop] = useState(null);

  const route = routes.find(r=>r.id===selRoute);
  const routeStops = stops.filter(s=>s.route_id===selRoute).sort((a,b)=>a.stop_number-b.stop_number);
  const totalWB = routeStops.reduce((a,s)=>a+s.wb,0);
  const totalGC = routeStops.reduce((a,s)=>a+s.gc,0);

  const submitStop = () => {
    if (!newStop.company_name) return;
    onAddStop({...newStop,id:`s-${Date.now()}`,route_id:selRoute,route_date:route?.date||'',stop_number:parseInt(newStop.stop_number)||routeStops.length+1,wb:newStop.wb,gc:newStop.gc});
    setNewStop({stop_number:'',company_name:'',category:'Law',address:'',contact_name:'',contact_title:'',phone:'',grade:null,wb:0,gc:0,follow_up:false,fu_status:'not_started',valid:true,repeat:false,card:false,notes:''});
    setShowStopForm(false);
  };

  return (
    <div className="space-y-5 fade-in">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-espresso">Daily Route Entry</h1>
        <button onClick={()=>setShowNewRoute(true)} className="px-4 py-2 rounded-lg text-sm font-semibold text-white" style={{background:'#C17F3B'}}>+ New Route Day</button>

const AnalyticsPage = ({stops, routes}) => {
  const validStops = stops.filter(s=>s.valid&&s.grade!==null&&s.category!=='Internal');

  const byRoute = routes.map(r=>{
    const rs = validStops.filter(s=>s.route_id===r.id);
    const avg = rs.length?+(rs.reduce((a,s)=>a+s.grade,0)/rs.length).toFixed(2):0;
    const wb = rs.reduce((a,s)=>a+s.wb,0);
    const gc = rs.reduce((a,s)=>a+s.gc,0);
    const g3 = rs.filter(s=>s.grade===3).length;
    return {name:r.date.slice(5),fullName:r.name,avg,wb,gc,g3,stops:rs.length};
  }).filter(x=>x.stops>0);

  const byCat = useMemo(()=>{
    const m = {};
    validStops.forEach(s=>{
      if(!m[s.category]) m[s.category]={name:s.category,total:0,sum:0,g3:0,wb:0,gc:0};
      m[s.category].total++; m[s.category].sum+=s.grade;
      if(s.grade===3) m[s.category].g3++;
      m[s.category].wb+=s.wb; m[s.category].gc+=s.gc;
    });
    return Object.values(m).map(x=>({...x,avg:+(x.sum/x.total).toFixed(2)})).sort((a,b)=>b.avg-a.avg);
  },[validStops]);

  const sampleData = byRoute.map(r=>({name:r.name,WB:r.wb,GC:r.gc}));
  const g3Trend = byRoute.map(r=>({name:r.name,'Grade 3':r.g3}));
  const totalWB = stops.reduce((a,s)=>a+s.wb,0);
  const totalGC = stops.reduce((a,s)=>a+s.gc,0);
  const pieData = [{name:'Whole Bean',value:totalWB},{name:'Ground Coffee',value:totalGC}];

  return (
    <div className="space-y-6 fade-in">
      <h1 className="text-2xl font-bold text-espresso">Analytics</h1>

      {/* Summary Stats */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[
          {l:'Total Samples',v:totalWB+totalGC,s:`${totalWB} WB · ${totalGC} GC`,c:'#C17F3B'},
          {l:'Grade 3 Rate',v:`${((validStops.filter(s=>s.grade===3).length/validStops.length)*100).toFixed(0)}%`,s:`${validStops.filter(s=>s.grade===3).length} of ${validStops.length} valid stops`,c:'#15803D'},
          {l:'Best Route Day',v:byRoute.sort((a,b)=>b.avg-a.avg)[0]?.name||'—',s:`Avg grade ${byRoute.sort((a,b)=>b.avg-a.avg)[0]?.avg||0}`,c:'#6B7C3D'},
          {l:'Cards Collected',v:stops.filter(s=>s.card).length,s:'Business cards',c:'#1D4ED8'},
        ].map((k,i)=><KPICard key={i} icon={['☕','⭐','🗓️','💳'][i]} label={k.l} value={k.v} sub={k.s} color={k.c}/>)}
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* Samples Over Time */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Coffee Samples by Route Day</h3>
          <SVGBarChart data={sampleData} labelKey="name" multiKeys={['WB','GC']} multiColors={['#C17F3B','#6B3D2E']} multiLabels={['Whole Bean','Ground Coffee']} height={220}/>
        </div>

        {/* WB vs GC Ratio */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Whole Bean vs Ground Coffee</h3>
          <div className="flex justify-center mt-2">
            <SVGDonut data={pieData} colors={['#C17F3B','#6B3D2E']} size={210}/>
          </div>
        </div>

        {/* Grade 3 Trend */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Grade 3 Stops Trend</h3>
          <SVGLineChart data={g3Trend} valueKey="Grade 3" labelKey="name" maxVal={Math.max(...g3Trend.map(d=>d['Grade 3']||0),1)} height={200} color="#15803D"/>
        </div>

        {/* By Industry */}
        <div className="bg-white rounded-xl p-5 shadow-card">
          <h3 className="font-semibold text-espresso mb-4">Avg Grade by Industry</h3>
          <SVGHBarChart data={byCat.filter(x=>x.name!=='Invalid')} valueKey="avg" labelKey="name" maxVal={3} height={220} color="#C17F3B"/>
        </div>
      </div>

      {/* Industry Breakdown Table */}
      <div className="bg-white rounded-xl shadow-card overflow-hidden">
        <div className="px-5 py-4 border-b border-sand"><h3 className="font-semibold text-espresso">Industry Breakdown</h3></div>
        <table className="w-full text-sm">
          <thead><tr className="bg-cream text-brown text-xs uppercase tracking-wide">
            <th className="px-4 py-2 text-left">Industry</th>
            <th className="px-4 py-2 text-center">Stops</th>
            <th className="px-4 py-2 text-center">Avg Grade</th>
            <th className="px-4 py-2 text-center">Grade 3</th>
            <th className="px-4 py-2 text-center">WB</th>
            <th className="px-4 py-2 text-center">GC</th>
          </tr></thead>
          <tbody>{byCat.filter(x=>x.name!=='Invalid').map((x,i)=>(
            <tr key={x.name} className={`border-t border-sand ${i%2===0?'bg-white':'bg-cream/30'}`}>
              <td className="px-4 py-3 font-medium text-espresso">{x.name}</td>
              <td className="px-4 py-3 text-center text-gray-600">{x.total}</td>
              <td className="px-4 py-3 text-center"><GradeBadge grade={Math.round(x.avg)}/></td>
              <td className="px-4 py-3 text-center font-bold" style={{color:'#15803D'}}>{x.g3}</td>
              <td className="px-4 py-3 text-center text-gray-600">{x.wb}</td>
              <td className="px-4 py-3 text-center text-gray-600">{x.gc}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
};

const NAV = [
  {id:'overview',  icon:'◉', label:'Overview'},
  {id:'routes',    icon:'🗺', label:'Routes'},
  {id:'entry',     icon:'✏️', label:'Daily Entry'},
  {id:'followups', icon:'📞', label:'Follow-Ups'},
  {id:'analytics', icon:'📈', label:'Analytics'},
];

function loadLS(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function saveLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function App() {
  const [page, setPage] = useState('overview');
  const [stops, setStops] = useState(() => loadLS('plexus_stops', INIT_STOPS));
  const [routes, setRoutes] = useState(() => loadLS('plexus_routes', INIT_ROUTES));
  const [sideOpen, setSideOpen] = useState(true);

  // Persist to localStorage whenever data changes
  useEffect(() => { saveLS('plexus_stops', stops); }, [stops]);
  useEffect(() => { saveLS('plexus_routes', routes); }, [routes]);

  const handleEditStop = useCallback((updated) => {
    setStops(prev => prev.map(s => s.id === updated.id ? updated : s));
  },[]);
  const handleDeleteStop = useCallback((id) => {
    if(confirm('Delete this stop?')) setStops(prev => prev.filter(s=>s.id!==id));
  },[]);
  const handleAddStop = useCallback((stop, isEdit=false) => {
    setStops(prev => isEdit ? prev.map(s=>s.id===stop.id?stop:s) : [...prev,stop]);
  },[]);
  const handleAddRoute = useCallback((route) => {
    setRoutes(prev => [...prev, route]);
  },[]);

  const fuCount = stops.filter(s=>s.follow_up&&s.fu_status==='not_started').length;
  const g3Unactioned = stops.filter(s=>s.grade===3&&s.follow_up&&s.fu_status==='not_started').length;

  return (
    <div className="flex min-h-screen" style={{background:'#FAF6F1',fontFamily:"'Inter',sans-serif"}}>
      {/* Sidebar */}
      <aside className={`${sideOpen?'w-56':'w-14'} flex-shrink-0 flex flex-col transition-all duration-200`}
        style={{background:'#2C1810',minHeight:'100vh'}}>
        {/* Logo */}
        <div className={`flex items-center gap-3 px-4 py-5 border-b border-white/10 ${!sideOpen&&'justify-center'}`}>
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-lg flex-shrink-0" style={{background:'#C17F3B'}}>☕</div>
          {sideOpen && <div>
            <div className="text-white font-bold text-sm leading-tight">Plexus</div>
            <div className="text-white/50 text-xs">Coffee Routes</div>
          </div>}
        </div>
        {/* Nav */}
        <nav className="flex-1 py-4 px-2 space-y-1">
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)}
              className={`nav-item w-full flex items-center gap-3 px-2 py-2.5 rounded-lg text-sm transition-colors ${page===n.id?'nav-active':'text-white/60 hover:text-white/90'}`}>
              <span className="text-base w-6 text-center flex-shrink-0">{n.icon}</span>
              {sideOpen && <span className="font-medium">{n.label}</span>}
              {sideOpen && n.id==='followups' && fuCount>0 && (
                <span className="ml-auto text-xs rounded-full px-1.5 py-0.5 font-bold" style={{background:'#C17F3B',color:'#fff'}}>{fuCount}</span>
              )}
            </button>
          ))}
        </nav>
        {/* Reset + Toggle */}
        <div className="mt-auto">
          {sideOpen && (
            <button onClick={()=>{if(confirm('Reset all data to original demo data?')){saveLS('plexus_stops',INIT_STOPS);saveLS('plexus_routes',INIT_ROUTES);setStops(INIT_STOPS);setRoutes(INIT_ROUTES);}}}
              className="w-full px-4 py-2 text-xs text-white/30 hover:text-white/60 hover:bg-white/5 text-left transition-colors border-t border-white/10">
              ↺ Reset to demo data
            </button>
          )}
          <button onClick={()=>setSideOpen(p=>!p)} className="w-full p-2 text-white/40 hover:text-white/70 hover:bg-white/5 text-xs text-center">
            {sideOpen?'◀ Collapse':'▶'}
          </button>
        </div>
      </aside>

      {/* Main */}
      <main className="flex-1 overflow-auto">
        {/* Top bar */}
        <div className="sticky top-0 z-10 bg-cream/90 backdrop-blur border-b border-sand px-6 py-3 flex items-center justify-between">
          <div className="text-sm text-brown font-medium">
            {NAV.find(n=>n.id===page)?.label}
          </div>
          <div className="flex items-center gap-3 text-sm">
            {g3Unactioned>0 && (
              <button onClick={()=>setPage('followups')} className="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold" style={{background:'#DCFCE7',color:'#15803D'}}>
                🚨 {g3Unactioned} hot lead{g3Unactioned>1?'s':''} need follow-up
              </button>
            )}
            <span className="text-xs text-gray-400 flex items-center gap-1">
              <span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:'#15803D'}}></span>
              Live · {stops.length} stops · {routes.length} routes
            </span>
            <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold" style={{background:'#C17F3B'}}>CW</div>
          </div>
        </div>

        {/* Page Content */}
        <div className="p-6 max-w-6xl mx-auto">
          {page==='overview'  && <OverviewPage  stops={stops} routes={routes}/>}
          {page==='routes'    && <RoutesPage    stops={stops} routes={routes} onEditStop={handleEditStop} onDeleteStop={handleDeleteStop}/>}
          {page==='entry'     && <DailyEntryPage routes={routes} stops={stops} onAddRoute={handleAddRoute} onAddStop={handleAddStop}/>}
          {page==='followups' && <FollowUpsPage stops={stops} onEditStop={handleEditStop}/>}
          {page==='analytics' && <AnalyticsPage stops={stops} routes={routes}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
